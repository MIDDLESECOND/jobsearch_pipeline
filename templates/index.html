<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LinkedIn Job Triage</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
         margin: 0; padding: 0 0 4rem; background: #f6f7f9; color: #1a1a1a; }
  header { position: sticky; top: 0; background: #fff; border-bottom: 1px solid #e3e6ea;
           padding: .75rem 1rem; display: flex; gap: .75rem; align-items: center;
           flex-wrap: wrap; z-index: 10; }
  header h1 { font-size: 1.05rem; margin: 0 1rem 0 0; }
  .tabs { display: flex; gap: .25rem; }
  .tab { border: 1px solid #d0d4da; background: #fff; padding: .35rem .75rem;
         border-radius: 999px; cursor: pointer; font-size: .85rem; }
  .tab.active { background: #2563eb; color: #fff; border-color: #2563eb; }
  input[type=date] { padding: .3rem .4rem; border: 1px solid #d0d4da; border-radius: 6px; }
  #count { margin-left: auto; color: #667; font-size: .85rem; }
  main { max-width: 920px; margin: 1rem auto; padding: 0 1rem; }
  .card { background: #fff; border: 1px solid #e3e6ea; border-radius: 10px;
          padding: .85rem 1rem; margin-bottom: .75rem; }
  .card.busy { opacity: .5; pointer-events: none; }
  .card h2 { font-size: 1rem; margin: 0 0 .35rem; }
  .meta { color: #556; font-size: .82rem; margin: .15rem 0; }
  .verdict { display: inline-block; font-size: .72rem; font-weight: 600; padding: .1rem .5rem;
             border-radius: 999px; margin-right: .4rem; }
  .v-PASS { background: #dcfce7; color: #166534; }
  .v-RECRUITER_ONLY { background: #fef9c3; color: #854d0e; }
  .v-GATE_FAIL { background: #fee2e2; color: #991b1b; }
  .score { font-weight: 700; }
  .scores { font-size: .78rem; color: #556; margin: .3rem 0; }
  .scores .ai { color: #1d4ed8; font-weight: 600; }
  .flag { font-size: .78rem; color: #b45309; margin: .1rem 0; }
  .oneline { font-size: .85rem; margin: .3rem 0; }
  .tag { font-size: .72rem; background: #eef; color: #335; padding: .05rem .4rem;
         border-radius: 4px; margin-left: .3rem; }
  .tag.repost { background: #f3e8ff; color: #6b21a8; }
  .tag.applied { background: #dcfce7; color: #166534; }
  .tag.passed { background: #e0e7ff; color: #3730a3; }
  .tag.rejected { background: #fee2e2; color: #991b1b; }
  .actions { margin-top: .55rem; display: flex; gap: .4rem; align-items: center; flex-wrap: wrap; }
  button { cursor: pointer; border: 1px solid #d0d4da; background: #fff; border-radius: 6px;
           padding: .35rem .7rem; font-size: .82rem; }
  button.apply { background: #16a34a; color: #fff; border-color: #16a34a; }
  button.pass { background: #6366f1; color: #fff; border-color: #6366f1; }
  button.reject { background: #dc2626; color: #fff; border-color: #dc2626; }
  button.undo { background: #f3f4f6; }
  select { padding: .33rem .4rem; border: 1px solid #d0d4da; border-radius: 6px; font-size: .82rem; }
  a { color: #2563eb; }
  .empty { text-align: center; color: #889; padding: 3rem 1rem; }
  .links { display: flex; gap: .6rem; align-items: center; flex-wrap: wrap; }
  button.send { background: #d97706; color: #fff; border-color: #d97706; font-size: .78rem;
                padding: .25rem .6rem; }
  .trunc { font-size: .74rem; color: #b45309; }
  .toast { font-size: .76rem; color: #166534; }
  /* Lives inside the (already sticky) <header> as a full-width row that wraps below the tabs, so
     it stays visible while scrolling instead of being painted behind a separate sticky bar. The
     negative margins cancel the header's padding so the banner spans edge-to-edge. */
  #linkbar { display: none; width: 100%; margin: .6rem -1rem -.75rem; padding: .5rem 1rem;
             background: #fff7ed; border-top: 1px solid #fed7aa; color: #9a3412; font-size: .85rem; }
  #linkbar button { margin-left: .5rem; }
  button.dupe { background: #fff; color: #6b21a8; border-color: #d8b4fe; font-size: .78rem;
                padding: .25rem .6rem; }
  button.dupe-target { background: #7c3aed; color: #fff; border-color: #7c3aed; }
  .card.anchor { outline: 2px solid #7c3aed; outline-offset: 1px; }
  /* Post-application outcome (applied cards): current-state tag + record/history controls. */
  .outcome { display: flex; gap: .5rem; align-items: center; flex-wrap: wrap; margin: .3rem 0; }
  .outcome .tag { margin-left: 0; }
  .tag.out-recruiter_screen { background: #dbeafe; color: #1e40af; }
  .tag.out-interview { background: #fde68a; color: #78350f; }
  .tag.out-offer { background: #bbf7d0; color: #14532d; font-weight: 700; }
  .tag.out-rejected_by_employer { background: #fee2e2; color: #991b1b; }
  .tag.out-ghosted { background: #f3f4f6; color: #6b7280; }
  .tag.out-withdrew { background: #e5e7eb; color: #374151; }
  .tag.noresp { background: #fff7ed; color: #9a3412; }
  input.note-in, input.resume-in, select.channel-in { padding: .3rem .4rem; border: 1px solid #d0d4da;
                border-radius: 6px; font-size: .8rem; }
  input.resume-in { width: 11rem; }
  select.channel-in { background: #fff; }
  input.note-in { width: 9rem; }
  button.record { background: #0891b2; color: #fff; border-color: #0891b2; }
  .history { font-size: .8rem; color: #445; background: #f8fafc; border: 1px solid #e3e6ea;
             border-radius: 6px; padding: .4rem .6rem; margin-top: .5rem; }
</style>
</head>
<body>
<header>
  <h1>LinkedIn Job Triage</h1>
  <div class="tabs">
    <button class="tab active" data-view="today">Today</button>
    <button class="tab" data-view="backlog">Backlog</button>
    <button class="tab" data-view="applied">Applied</button>
    <button class="tab" data-view="passed">Passed</button>
  </div>
  <input type="date" id="date" value="{{ today }}">
  <button id="toggleDecided" class="tab" style="display:none"></button>
  <span id="count"></span>
  <div id="linkbar"></div>
</header>
<main id="list"></main>

<script>
const GATES = {{ gates | tojson }};
const EVENTS = {{ events | tojson }};  // states.ALL_EVENTS — lifecycle outcomes + 'note'
const CHANNELS = {{ channels | tojson }};  // states.ALL_CHANNELS — how the application went out
const FEEDBACK_URL = (() => {
  let u = String({{ feedback_url | tojson }});
  if (!u) return "";
  // Forgive a pasted URL missing its scheme ("claude.ai/project/x", "localhost:3000") — without
  // one, window.open would treat it as a path on this Flask server and open a 404 tab, and the
  // label below couldn't identify the assistant. host:port values parse as scheme:path rather
  // than throwing, so an empty hostname needs the https:// retry too.
  let host = "";
  try { host = new URL(u).hostname; } catch (e) {}
  if (!host) {
    try { new URL("https://" + u); u = "https://" + u; } catch (e2) {}
  }
  return u;
})();
// The send button copies the JD and opens feedback_project_url — the mechanism works with any
// chat assistant (a claude.ai project, a ChatGPT project, …), so label it by what the
// configured URL actually points at instead of hardcoding one product.
const ASSISTANT = (() => {
  if (!FEEDBACK_URL) return null;
  let host = "";
  try { host = new URL(FEEDBACK_URL).hostname; } catch (e) {}
  if (host.includes("claude")) return "Claude";
  if (host.includes("chatgpt") || host.includes("openai")) return "ChatGPT";
  if (host.includes("gemini")) return "Gemini";
  return "assistant";
})();
const SEND_LABEL = ASSISTANT ? "Send to " + ASSISTANT : "Copy JD";
const TODAY = {{ today | tojson }};
let view = "today";
// localStorage access can throw outright (browser set to block all site data) — a top-level
// throw would kill this whole script block, so route through a wrapper that degrades to
// "works, just doesn't persist".
const storage = {
  get(k) { try { return localStorage.getItem(k); } catch (e) { return null; } },
  set(k, v) { try { localStorage.setItem(k, v); } catch (e) {} },
};
// Today-view display filter: hide cards that arrived already-decided (with multiple runs a day,
// earlier batches are mostly triaged clutter). Persisted; default hidden. Today-only — Backlog
// already excludes decided rows server-side, and Applied/Passed ARE decision history.
let hideDecided = storage.get("hideDecided") !== "0";
// Cards the hide-decided filter must keep visible this session — so a card the user just acted
// on can't vanish and take its Undo button with it. Fed by the server's per-operation `exempt`
// lists (chain.py computes which rows' displayed state each mutation flips), NOT the whole
// affected chain: over-exempting would resurface long-hidden decided relistings. Undo actions
// additionally drop their chain's now-stale grants first (see decide()).
const decidedThisSession = new Set();

// The ONE feeder for decidedThisSession. Mutation handlers pass the server's data.exempt
// verbatim — the curation lives in chain.py's _forward_exempt/_undo_exempt/dupe cores, not
// here. Catch paths pass the clicked url as a best-effort fallback for a lost response.
function exemptFromHide(urls) { for (const u of urls || []) decidedThisSession.add(u); }
// The posting pinned as the anchor for manual duplicate-linking, or null. Kept in module state
// (not reset by load()) so it survives tab/date changes — you can pin one card, navigate to a
// different day or the Backlog, and click the duplicate there. Mirrors `pipeline dupe`.
let linkAnchor = null;
// Guards against a second link/unlink POST while one is in flight (the buttons render on every
// card, so a per-card .busy isn't enough — a fast click on two different targets would double-fire).
let linkBusy = false;
// Count of in-flight /api/decision POSTs. The hide-decided toggle and the link-mode controls
// skip re-rendering while this or linkBusy is set — churn-avoidance, not correctness: a rebuild
// mid-flight is SAFE (busyUrls re-locks the pending card, and decide() falls back to a reload
// for its detached node), it just costs an extra refetch and a flash for nothing.
let mutBusy = 0;
// urls with a decision/dupe POST in flight. Two jobs, both load-bearing: card() re-applies the
// .busy lock from this set so any rebuild recreates a pending card LOCKED instead of live (the
// double-fire guard), and the handlers' entry checks use it to block keyboard re-activation
// (.busy's pointer-events:none stops the mouse but not Enter on the focused button).
const busyUrls = new Set();

// Selected by data-view — the semantic the click handler consumes — so a button that merely
// shares the .tab pill style (#toggleDecided) can never be picked up as a view tab, even if it
// later moves inside the .tabs container.
const tabs = document.querySelectorAll(".tabs [data-view]");
const dateInput = document.getElementById("date");
const list = document.getElementById("list");
const countEl = document.getElementById("count");
const toggleDecidedBtn = document.getElementById("toggleDecided");

toggleDecidedBtn.addEventListener("click", () => {
  if (mutBusy || linkBusy) return;  // churn-avoidance while a mutation POST is mid-flight (see mutBusy)
  hideDecided = !hideDecided;
  render();
  storage.set("hideDecided", hideDecided ? "1" : "0");  // best-effort — set() never throws
});

tabs.forEach(t => t.addEventListener("click", () => {
  tabs.forEach(x => x.classList.remove("active"));
  t.classList.add("active");
  view = t.dataset.view;
  dateInput.style.display = view === "today" ? "" : "none";
  load();
}));
dateInput.addEventListener("change", () => { if (view === "today") load(); });

function fmtSalary(min, max) {
  if (!min && !max) return null;
  const f = n => n ? "$" + Math.round(n).toLocaleString() : "?";
  return "Salary: " + f(min) + "–" + f(max);
}

function esc(s) {
  return (s ?? "").toString().replace(/[&<>"']/g, c =>
    ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
}

// The decision in force for a card, walking a relisting back to its canonical original (its own
// app_status is null — only the canonical carries the decision). Own decision wins, else the
// chain's. Mirrors pipeline's _repost_info / the server join.
function effectiveStatus(j) {
  if (j.app_status) return j.app_status;
  if (j.filter_source) return "rejected";
  if (j.chain_app_status) return j.chain_app_status;
  if (j.chain_filter_source) return "rejected";
  return null;
}
function effectiveDate(j) { return j.status_date || j.chain_status_date || ""; }

function statusTag(j) {
  const eff = effectiveStatus(j);
  const d = esc(effectiveDate(j));
  // Loud "↻ already …" prefix when the decision is inherited from the chain, not made on this row.
  const pre = (j.is_repost && !j.app_status && !j.filter_source) ? "↻ already " : "";
  if (eff === "applied") return `<span class="tag applied">${pre}applied ${d}</span>`;
  if (eff === "passed") return `<span class="tag passed">${pre}passed ${d}</span>`;
  if (eff === "rejected") return `<span class="tag rejected">${pre}rejected${j.filter_gate ? " · " + esc(j.filter_gate) : ""}</span>`;
  return "";
}

// Current post-application state for an applied card: the chain's cached outcome (from
// chain._recompute_outcome, read through effective_decision server-side), or the honest
// "no response" fallback aged from the apply date — the follow-up surfacing hook.
function outcomeRowHTML(j) {
  if (effectiveStatus(j) !== "applied") return "";
  let tag;
  if (j.chain_outcome_status) {
    const label = esc(j.chain_outcome_status.replace(/_/g, " "));
    tag = `<span class="tag out-${esc(j.chain_outcome_status)}">${label}${j.chain_outcome_date ? " · " + esc(j.chain_outcome_date) : ""}</span>`;
  } else {
    const d = effectiveDate(j);
    const days = d ? Math.max(0, Math.floor((Date.parse(TODAY) - Date.parse(d)) / 86400000)) : null;
    tag = `<span class="tag noresp">no response${days != null ? " — applied " + days + "d ago" : ""}</span>`;
  }
  return `<div class="outcome">${tag}</div>`;
}

function scoreLine(b) {
  // Render whatever dimensions the stored eval has (the schema has changed over time);
  // highlight any AI-related dimension. Mirrors the report's score line.
  return Object.entries(b).map(([k, v]) => {
    const ai = k.startsWith("ai_");
    const label = esc(k.replace(/_/g, " "));
    return `<span class="${ai ? "ai" : ""}">${label} ${v == null ? "–" : esc(v)}</span>`;
  }).join(" · ");
}

function card(j) {
  const div = document.createElement("div");
  // Re-apply the in-flight lock: a card rebuilt while its POST is pending must not come back
  // with live buttons (double-fire) — see busyUrls.
  div.className = busyUrls.has(j.job_url) ? "card busy" : "card";
  div.dataset.url = j.job_url;  // lets a decision update every affected (repost-chain) card
  const salary = fmtSalary(j.salary_min, j.salary_max);
  const score = j.fit_score != null ? `<span class="score">${j.fit_score}/18</span> (${j.band})` : "";
  // Eval-skipped relistings (repost_evaluated) have verdict NULL by design — show the chain's
  // verdict + fit (read through chain.effective_decision) so a PASS-chain relisting isn't a
  // bare card and the user sees the role's score without chasing the canonical.
  const chainFit = j.chain_fit_score != null ? ` ${j.chain_fit_score}/18` : "";
  const verdict = j.verdict ? `<span class="verdict v-${j.verdict}">${j.verdict}</span>`
                : (j.chain_verdict ? `<span class="verdict v-${j.chain_verdict}">↻ chain ${j.chain_verdict}${chainFit}</span>` : "");
  const repost = j.is_repost ? `<span class="tag repost">↻ repost</span>` : "";
  const flags = (j.flags||[]).map(f => `<div class="flag">⚠️ ${esc(f)}</div>`).join("");
  const gateOpts = GATES.map(g => `<option value="${g}">${g}</option>`).join("");

  div.innerHTML = `
    <h2>${esc(j.title)} — ${esc(j.company)} ${statusTag(j)} ${repost}</h2>
    ${outcomeRowHTML(j)}
    <div class="meta">${verdict}${score}</div>
    ${j.bucket_label ? `<div class="meta">${esc(j.bucket_label)}</div>` : ""}
    ${j.failed_gate ? `<div class="meta">failed gate: <b>${esc(j.failed_gate)}</b></div>` : ""}
    <div class="meta">${esc(j.location||"")} · tier: ${esc(j.tier||"")} · search: <code>${esc(j.search_name||"")}</code>${salary ? " · " + esc(salary) : ""}${j.source === "adzuna" ? ` · source: <code>adzuna</code> <span class="trunc">📋 500-char snippet</span>` : (j.source && j.source !== "linkedin" ? ` · source: <code>${esc(j.source)}</code>` : "")}${j.age_label ? ` · 🕐 ${esc(j.age_label)}` : ""}</div>
    ${j.one_line ? `<div class="oneline">${esc(j.one_line)}</div>` : ""}
    ${j.fit_score != null ? `<div class="scores">${scoreLine(j.score_breakdown||{})}</div>` : ""}
    ${flags}
    <div class="meta links">
      <a href="${esc(j.job_url)}" target="_blank" rel="noopener">Posting ↗</a>
      ${j.has_description ? `<button class="send" type="button">${esc(SEND_LABEL)}</button>` : ""}
      ${j.truncated ? `<span class="trunc">⚠ JD may be truncated</span>` : ""}
      <span class="toast"></span>
    </div>
    <div class="actions"></div>
  `;
  const actions = div.querySelector(".actions");

  const sendBtn = div.querySelector(".send");
  if (sendBtn) sendBtn.addEventListener("click", () => sendToAssistant(div, j.job_url));

  // A chain-decided relisting (decision inherited from its canonical) is read-only here — undo it
  // on the original, which lives in the Applied/Passed view.
  const decided = effectiveStatus(j);
  if (j.app_status) {
    actions.appendChild(btn("Undo", "undo", () => decide(div, j, "undo_app")));
  } else if (j.filter_source === "manual") {
    // Only manual rejects are safe to undo here. A rule-filtered row (filter_source
    // "rule:…") stays display-only — edit filters.yaml to change the rule.
    actions.appendChild(btn("Undo reject", "undo", () => decide(div, j, "undo_reject")));
  }
  if (!decided) {
    actions.appendChild(btn("Applied", "apply", () => {
      // Busy guard BEFORE the modal: decide() would drop a re-activation silently AFTER the
      // user typed into a second prompt (keyboard re-entry — Enter on the still-focused
      // button — bypasses .busy's pointer-events, the documented gap the busyUrls set
      // exists for). Refusing up front means no doomed prompt ever opens.
      if (linkBusy || busyUrls.has(j.job_url)) return;
      // Two optional prompts — resume variant, then channel. Blank = apply without one
      // (zero-friction default; edit later via the inline fields). Cancel/Escape ABORTS the
      // whole action — an accidental Applied click must have a way out, and a dialog
      // dismissal reading as "commit anyway" is the wrong side of that trade (worst case
      // with dialogs suppressed the button visibly does nothing, which beats silently
      // deciding chain-wide).
      const rv = prompt("Resume variant used (blank = none, Cancel = don't mark applied):", "");
      if (rv === null) return;
      const ch = prompt(`Channel — ${CHANNELS.join(" / ")} (blank = none, Cancel = don't mark applied):`, "");
      if (ch === null) return;
      const chv = ch.trim().toLowerCase();
      if (chv && !CHANNELS.includes(chv)) {
        // A typo'd channel must not abort the apply (the server would refuse the WHOLE
        // decision) nor be sent raw — record without it; the card's select fixes it later.
        // "Applied tab": outside the today view the apply removes the card from the
        // current view, so that is where the fix-up select actually lives.
        alert(`channel must be one of: ${CHANNELS.join(", ")} — applying without a channel (set it on the card in the Applied tab afterwards)`);
      }
      decide(div, j, "applied", undefined, rv.trim() || undefined,
             CHANNELS.includes(chv) ? chv : undefined);
    }));
    actions.appendChild(btn("Passed", "pass", () => decide(div, j, "passed")));
    const sel = document.createElement("select");
    sel.innerHTML = `<option value="">gate…</option>` + gateOpts;
    actions.appendChild(btn("Reject", "reject", () => {
      const g = sel.value || "other";
      decide(div, j, "reject", g);
    }));
    actions.appendChild(sel);
  }

  if (decided === "applied") {
    // Outcome tracking controls. The event lands on the chain server-side (canonical-keyed,
    // read chain-wide), so recording from a relisting's card is fine.
    const orow = div.querySelector(".outcome");
    if (orow) {
      orow.appendChild(resumeField(div, j));
      orow.appendChild(channelField(div, j));
    }
    const esel = document.createElement("select");
    esel.innerHTML = `<option value="">event…</option>`
      + EVENTS.map(e => `<option value="${e}">${e.replace(/_/g, " ")}</option>`).join("");
    const enote = document.createElement("input");
    enote.className = "note-in"; enote.placeholder = "note…";
    actions.appendChild(esel);
    actions.appendChild(enote);
    actions.appendChild(btn("Record", "record", () => {
      const t = esel.value;
      if (!t) { alert("pick an event type first"); return; }
      if (t === "note" && !enote.value.trim()) { alert("a note event needs note text"); return; }
      postEvent(div, j, {type: t, note: enote.value.trim() || undefined});
    }));
    actions.appendChild(btn("History ▸", "undo", ev => toggleHistory(div, j, ev.currentTarget)));
    actions.appendChild(btn("Undo last", "undo", () => postEvent(div, j, {undo: true})));
  }

  appendLinkControls(actions, div, j);
  return div;
}

// The manual duplicate-linking affordances — shared by card() and refreshLinkControls(), which
// patches them in place on non-today views. Sticky across reloads (re-reads linkAnchor), so you
// can pin one card and click its match in another tab/date. The buttons carry .linkctl so the
// in-place patch can find and replace exactly them.
function appendLinkControls(actions, div, j) {
  div.classList.toggle("anchor", !!(linkAnchor && linkAnchor.job_url === j.job_url));
  if (linkAnchor && linkAnchor.job_url === j.job_url) {
    actions.appendChild(btn("Cancel link", "undo linkctl", cancelLink));
  } else if (linkAnchor) {
    actions.appendChild(btn("↩ same role", "dupe-target linkctl", () => completeLink(div, j)));
  } else {
    actions.appendChild(btn("⧉ duplicate", "dupe linkctl", () => startLink(j)));
  }
  if (j.is_manual_repost) {
    actions.appendChild(btn("Unlink dup", "undo linkctl", () => unlinkDup(div, j)));
  }
}

function btn(label, cls, onClick) {
  const b = document.createElement("button");
  b.className = cls; b.textContent = label; b.addEventListener("click", onClick);
  return b;
}

async function copyText(text) {
  // navigator.clipboard works on http://127.0.0.1 (localhost is a secure context); fall back to
  // a hidden textarea + execCommand for older browsers.
  try {
    await navigator.clipboard.writeText(text);
    return true;
  } catch (e) {
    try {
      const ta = document.createElement("textarea");
      ta.value = text; ta.style.position = "fixed"; ta.style.opacity = "0";
      document.body.appendChild(ta); ta.focus(); ta.select();
      const ok = document.execCommand("copy");
      document.body.removeChild(ta);
      return ok;
    } catch (e2) { return false; }
  }
}

async function sendToAssistant(div, job_url) {
  const toast = div.querySelector(".toast");
  toast.textContent = "Fetching JD…";
  try {
    const res = await fetch("/api/clip?job_url=" + encodeURIComponent(job_url));
    if (!res.ok) { toast.textContent = "No description to copy"; return; }
    const data = await res.json();
    // Copy BEFORE opening the project tab. Opening a tab moves focus to it, and a clipboard
    // write on an unfocused document fails ("Document is not focused") — so copy while this
    // page still has focus, then open the tab.
    const copied = await copyText(data.text);
    if (FEEDBACK_URL) window.open(FEEDBACK_URL, "feedback_project");
    if (!copied) { toast.textContent = "Copy failed — select & copy manually"; return; }
    toast.textContent = FEEDBACK_URL
      ? `Copied — paste into your ${ASSISTANT} project (Ctrl+V)`
      : "JD copied — set settings.feedback_project_url to auto-open your project";
  } catch (e) {
    toast.textContent = "Error: " + e;
  }
}

function setCount(n, hidden = 0) {
  countEl.textContent = n + " posting" + (n === 1 ? "" : "s")
    + (hidden ? ` · ${hidden} decided hidden` : "");
}

// Shared POST for the three mutation handlers — one copy of the headers and of the 30s
// timeout (a wedged server request, e.g. the jobs.db-on-USB hang, must not pin the busy
// flags forever). Old browsers lack AbortSignal.timeout — degrade to no timeout rather
// than a dead mutation surface.
async function postJSON(url, body) {
  const res = await fetch(url, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(body),
    signal: (typeof AbortSignal !== "undefined" && AbortSignal.timeout)
      ? AbortSignal.timeout(30000) : undefined,
  });
  return res.json();
}

// Release an in-flight lock. Clears the set, unlocks the handler's captured node (may be
// detached — harmless), AND unlocks any freshly-rendered card for the same url: the success
// paths re-render BEFORE this cleanup runs, and card() bakes .busy from busyUrls, so without
// the re-query the new card would stay locked forever.
function releaseBusy(url, div) {
  busyUrls.delete(url);
  div.classList.remove("busy");
  list.querySelectorAll(".card.busy").forEach(el => {
    if (el.dataset.url === url) el.classList.remove("busy");
  });
}

// Mirror server-side cmd_mark / cmd_reject on the local job object so we can update the card
// without refetching the whole list.
function patchJob(j, action, gate, resume, channel) {
  if (action === "applied" || action === "passed") { j.app_status = action; j.status_date = TODAY; }
  else if (action === "undo_app") { j.app_status = null; j.status_date = null; }
  else if (action === "reject") { j.filter_source = "manual"; j.filter_gate = gate || "other"; }
  else if (action === "undo_reject") { j.filter_source = null; j.filter_gate = null; }
  // Mirror the server's outcome-cache handling: a fresh 'applied' carries the prompted resume
  // variant; an undo (or a 'passed') clears the cached outcome fields chain-wide. (Server-side
  // the event HISTORY survives an undo and a re-apply recomputes the outcome back — the next
  // reload shows it; this mirror only needs to keep the card honest until then.)
  if (action === "applied") {
    j.resume_variant = resume || null; j.chain_resume_variant = resume || null;
    j.channel = channel || null; j.chain_channel = channel || null;
  }
  if (action === "undo_app" || action === "passed") {
    j.resume_variant = null; j.chain_resume_variant = null;
    j.channel = null; j.chain_channel = null;
    j.outcome_status = null; j.outcome_date = null;
    j.chain_outcome_status = null; j.chain_outcome_date = null;
  }
  // The decision propagates to the canonical original (server-side _chain_targets), so keep the
  // cached chain_* fields in sync with this row's new decision. Otherwise the today-view in-place
  // re-render would read a stale inherited decision (e.g. after Undo) and wrongly show the card as
  // already-decided / read-only until a full reload.
  j.chain_app_status = j.app_status || null;
  j.chain_status_date = j.status_date || null;
  j.chain_filter_source = j.filter_source || null;
}

async function decide(div, j, action, gate, resume, channel) {
  // linkBusy: a chain merge/unlink is committing — don't race a decision against it.
  // busyUrls: this url already has a POST in flight — .busy's pointer-events:none stops mouse
  // re-clicks but NOT keyboard activation (Enter on the still-focused button), so guard by url.
  if (linkBusy || busyUrls.has(j.job_url)) return;
  const seq0 = loadSeq;  // capture: detect a load() racing this mutation (its rows may pre-date the commit)
  div.classList.add("busy");
  busyUrls.add(j.job_url);
  mutBusy++;
  try {
    const data = await postJSON("/api/decision", {job_url: j.job_url, action, gate, resume, channel});
    if (!data.ok) { alert(data.message || "failed"); return; }
    // The decision propagates across the repost chain, so more than the clicked card may change.
    const affected = new Set((data.affected && data.affected.length) ? data.affected : [j.job_url]);
    // Apply the server's exemption list (chain.py owns the curation). UNDO actions first drop
    // the chain's existing grants — the forward action's exemptions are stale, which is how an
    // undone reject stops leaking a rule-restamped sibling past the filter — then re-add the
    // surviving handles. Forward actions ADD only: deleting here would wipe exemptions earned
    // by EARLIER actions this session (a sibling decided minutes ago would vanish the moment a
    // second operation touches its chain). Runs BEFORE any early return, so a committed
    // decision can never re-hide the card and take its Undo button with it.
    if (action === "undo_app" || action === "undo_reject") {
      affected.forEach(u => decidedThisSession.delete(u));
    }
    exemptFromHide(data.exempt);
    patchJob(j, action, gate, resume, channel);
    // Overwrite the mirror's guesses with the server's post-mutation chain truth: a
    // re-apply RESTORES the outcome from kept event history and may inherit a stored
    // resume variant — neither is derivable client-side, and rendering the stale mirror
    // invited re-recording an event that already exists (a permanent duplicate row).
    if ("outcome_status" in data) {
      for (const r of jobsData) {
        if (affected.has(r.job_url)) {
          r.chain_outcome_status = data.outcome_status;
          r.chain_outcome_date = data.outcome_date;
          r.chain_resume_variant = data.resume_variant;
          r.chain_channel = data.channel;
        }
      }
      j.chain_outcome_status = data.outcome_status;
      j.chain_outcome_date = data.outcome_date;
      j.chain_resume_variant = data.resume_variant;
      j.resume_variant = data.resume_variant;
      j.chain_channel = data.channel;
      j.channel = data.channel;
    }
    // A load() raced this decision (tab/date change mid-flight — the only rebuild sources the
    // entry guards don't block, and each bumps loadSeq): its rows may have been read before the
    // commit — refetch rather than patch a snapshot that may not show it. Past this check,
    // `view` is still the view the click happened in.
    if (loadSeq !== seq0) { await load(); return; }
    if (view === "today") {
      // An undo that leaves the chain still displaying a decision (exempt non-empty: a
      // sibling's manual reject or app_status survives) can't be patched in place — patchJob
      // just synced this row's chain_* fields to its own nulls, which would render the card
      // falsely undecided with live buttons. Refetch the truth.
      if ((action === "undo_app" || action === "undo_reject") && data.exempt && data.exempt.length) {
        await load(); return;
      }
      // Backstop, unreachable under the current entry guards (every render() caller is
      // mutBusy/linkBusy-guarded and every load() bumps loadSeq, caught above): if a future
      // rebuild source detaches this node, an in-place replace would be a silent no-op.
      if (!div.isConnected) { await load(); return; }
      // Re-render the clicked card in place, and refresh the toggle label (undoing an
      // arrived-decided card changes the would-hide count).
      div.replaceWith(card(j));
      renderToggle();
      // A chain sibling sharing today's view is rare; if one exists — even hidden by the decided
      // filter, so scan jobsData rather than the DOM — reload to refresh its cached chain fields.
      const sibling = jobsData.some(r => r.job_url !== j.job_url && affected.has(r.job_url));
      if (sibling) {
        const y = window.scrollY;  // the reload rebuilds the list and resets scroll to the top
        // Restore only if OUR reload reached the screen — a superseded load must not scroll
        // whatever view replaced it to this view's offset.
        if (await load()) window.scrollTo(0, y);
      }
    } else {
      // backlog / applied / passed: every affected row leaves the view → drop those cards, and
      // prune jobsData to match so render() stays a pure function of it. The count comes from
      // the pruned model, not a second full-DOM walk.
      list.querySelectorAll(".card").forEach(el => { if (affected.has(el.dataset.url)) el.remove(); });
      jobsData = jobsData.filter(r => !affected.has(r.job_url));
      const n = jobsData.length;
      setCount(n);
      if (n === 0) list.innerHTML = `<div class="empty">Nothing here.</div>`;
    }
  } catch (e) {
    alert("error: " + e);
    // The server may have committed before the response was lost — exempt the clicked url so a
    // decision that DID land can't re-hide the card (a false exemption just leaves it visible).
    // Best-effort by necessity: without the response the client can't know the chain, so a
    // visible sibling the committed decision also flipped may still hide on the next reload.
    exemptFromHide([j.job_url]);
  } finally {
    mutBusy--;
    releaseBusy(j.job_url, div);
  }
}

// Record (or undo the last) post-application outcome event. Same in-flight guards as
// decide(); unlike a decision it never flips decided/undecided, so there is no hide-filter
// or view-membership churn — patch the outcome cache on every affected chain member and
// rebuild just those cards.
async function postEvent(div, j, body) {
  if (linkBusy || busyUrls.has(j.job_url)) return;
  const seq0 = loadSeq;  // same race decide() guards: a load() mid-flight may read pre-commit rows
  div.classList.add("busy");
  busyUrls.add(j.job_url);
  mutBusy++;
  try {
    const data = await postJSON("/api/event", Object.assign({job_url: j.job_url}, body));
    if (!data.ok) { alert(data.message || "failed"); return; }
    exemptFromHide(data.exempt);
    // A tab/date switch raced this POST: its rows may pre-date the commit, and our jobsData
    // patch would land on a swapped-out array — the recorded outcome tag would silently
    // vanish (inviting a duplicate Record). Refetch the truth instead of patching.
    if (loadSeq !== seq0) { await load(); return; }
    const affected = new Set((data.affected && data.affected.length) ? data.affected : [j.job_url]);
    // ONE patch site: j is itself a jobsData row and affected always contains it, so the
    // loop covers the clicked card too — a separate direct patch would just be a second
    // copy of these fields for future edits to miss.
    for (const r of jobsData) {
      if (affected.has(r.job_url)) {
        r.chain_outcome_status = data.outcome_status;
        r.chain_outcome_date = data.outcome_date;
      }
    }
    // Rebuild every affected card on screen (clicked one included) so outcome tags stay in
    // sync across a repost chain. card() re-applies the .busy lock from busyUrls; releaseBusy
    // in the finally unlocks the fresh nodes.
    const byUrl = new Map(jobsData.map(r => [r.job_url, r]));
    list.querySelectorAll(".card").forEach(el => {
      const r = byUrl.get(el.dataset.url);
      if (!r || !affected.has(el.dataset.url)) return;
      // Never wipe a SIBLING card's in-progress input (typed note, chosen event type,
      // focused field) — its stale outcome tag can wait for the next action/reload; lost
      // user text cannot. The clicked card itself always rebuilds (its input was consumed).
      if (el !== div && (el.querySelector(".note-in")?.value
                         || el.querySelector(".actions select")?.value
                         || el.contains(document.activeElement))) return;
      el.replaceWith(card(r));
    });
  } catch (e) {
    alert("error: " + e);
  } finally {
    mutBusy--;
    releaseBusy(j.job_url, div);
  }
}

// Lazy-loaded chain event timeline, toggled per card ("History ▸"/"▾"). Read-only fetch —
// no busy locking; a re-render simply drops the open panel (state lives in the DOM).
async function toggleHistory(div, j, btnEl) {
  const open = div.querySelector(".history");
  if (open) { open.remove(); btnEl.textContent = "History ▸"; return; }
  btnEl.textContent = "History …";
  let evs = null;  // null = fetch failed — must NOT render as the affirmative "no events"
  try {
    const res = await fetch("/api/events?job_url=" + encodeURIComponent(j.job_url));
    if (res.ok) evs = await res.json();
  } catch (e) { /* evs stays null */ }
  // The card may have been rebuilt while the fetch was in flight (postEvent's replaceWith)
  // — appending to the detached node would silently show nothing while flipping a dead
  // button's label. Bail; the fresh card's button still reads "History ▸" and works.
  if (!div.isConnected) return;
  if (div.querySelector(".history")) { btnEl.textContent = "History ▾"; return; }  // double-click race
  const p = document.createElement("div");
  p.className = "history";
  p.innerHTML = evs === null
    ? "<div>⚠ Couldn't load history — close and retry.</div>"
    : (evs.length
      ? evs.map(e => `<div>${esc(e.event_date)} — <b>${esc(e.event_type.replace(/_/g, " "))}</b>${e.note ? " · " + esc(e.note) : ""}</div>`).join("")
      : "<div>No events recorded yet.</div>");
  div.appendChild(p);
  btnEl.textContent = "History ▾";
}

// The ONE copy of the applied-field save-on-change machinery — shared by resumeField and
// channelField so a race/busy fix can never land in one field and not the other. It runs
// under the SAME in-flight discipline as decide()/postEvent (these saves were the one
// mutating path outside it, and the blur that triggers a save fires exactly when the user
// clicks another button on the card — i.e. exactly when a concurrent mutation on the same
// chain is about to start). Returns the change handler. `opts`:
//   action      /api/decision action (set_resume | set_channel)
//   payloadKey  request-body key carrying the value (resume | channel)
//   localKey    this row's own field to mirror        (resume_variant | channel)
//   chainKey    the chain-wide field mirrored on affected rows (chain_resume_variant | …)
//   selector    sibling control selector, synced in place
//   control     the input/select element (read + reverted via .value)
//   readValue   () => the normalized value to save; empty string clears server-side
function saveAppliedField(div, j, {action, payloadKey, localKey, chainKey, selector,
                                   control, readValue}) {
  const revert = () => { control.value = j[chainKey] || ""; };
  return async () => {
    const v = readValue();
    if (v === (j[chainKey] || "")) return;  // no-op change — don't lock the card
    if (linkBusy || busyUrls.has(j.job_url)) {
      revert();  // a mutation is in flight — revert, retry after
      return;
    }
    const seq0 = loadSeq;
    div.classList.add("busy");
    busyUrls.add(j.job_url);
    mutBusy++;
    try {
      const data = await postJSON("/api/decision",
        {job_url: j.job_url, action, [payloadKey]: v});
      if (!data.ok) { alert(data.message || "failed"); revert(); return; }
      if (loadSeq !== seq0) { await load(); return; }  // superseded — refetch (see postEvent)
      j[localKey] = v || null;
      j[chainKey] = v || null;
      const affected = new Set(data.affected || []);
      for (const r of jobsData) {
        if (affected.has(r.job_url)) r[chainKey] = v || null;
      }
      // Sync sibling cards' controls IN PLACE (no rebuild — that would wipe their other
      // in-progress input, see postEvent's guard): a same-chain card on screen must not
      // keep displaying the old value beside the one just saved.
      list.querySelectorAll(".card").forEach(el => {
        if (el !== div && affected.has(el.dataset.url)) {
          const sib = el.querySelector(selector);
          if (sib) sib.value = v;
        }
      });
    } catch (e) {
      alert("error: " + e);
      revert();
    } finally {
      mutBusy--;
      releaseBusy(j.job_url, div);
    }
  };
}

// Inline resume-variant field on applied cards. Saves on change (blur after an edit) or
// Enter; empty clears. Server-side it propagates chain-wide (chain.set_resume).
function resumeField(div, j) {
  const wrap = document.createElement("span");
  wrap.className = "outcome";
  wrap.innerHTML = `📄`;
  const inp = document.createElement("input");
  inp.className = "resume-in";
  inp.placeholder = "resume variant…";
  inp.value = j.chain_resume_variant || "";
  inp.title = "resume variant sent (Enter or click away to save)";
  wrap.appendChild(inp);
  inp.addEventListener("keydown", e => { if (e.key === "Enter") inp.blur(); });
  inp.addEventListener("change", saveAppliedField(div, j, {
    action: "set_resume", payloadKey: "resume", localKey: "resume_variant",
    chainKey: "chain_resume_variant", selector: ".resume-in", control: inp,
    readValue: () => inp.value.trim(),
  }));
  return wrap;
}

// Inline channel select on applied cards — resumeField's sibling, same shared save core
// (saveAppliedField); server-side chain.set_channel propagates chain-wide and validates
// against states.ALL_CHANNELS. Blank clears.
function channelField(div, j) {
  const wrap = document.createElement("span");
  wrap.className = "outcome";
  wrap.innerHTML = `📨`;
  const sel = document.createElement("select");
  sel.className = "channel-in";
  sel.title = "application channel (how it went out)";
  sel.innerHTML = `<option value="">channel…</option>`
    + CHANNELS.map(c => `<option value="${c}">${c}</option>`).join("");
  sel.value = j.chain_channel || "";
  wrap.appendChild(sel);
  sel.addEventListener("change", saveAppliedField(div, j, {
    action: "set_channel", payloadKey: "channel", localKey: "channel",
    chainKey: "chain_channel", selector: ".channel-in", control: sel,
    readValue: () => sel.value,
  }));
  return wrap;
}

function renderLinkbar() {
  const bar = document.getElementById("linkbar");
  if (!linkAnchor) { bar.style.display = "none"; bar.innerHTML = ""; return; }
  bar.style.display = "block";  // explicit — "" would fall back to the stylesheet's display:none
  bar.innerHTML = `Linking <b>${esc(linkAnchor.title)} — ${esc(linkAnchor.company)}</b> — `
    + `click <b>↩ same role</b> on its duplicate (switch tabs/dates to find it; `
    + `hidden decided cards are shown while linking).`;
  const cancel = btn("Cancel", "undo", cancelLink);
  bar.appendChild(cancel);
}

function startLink(j) {
  // Not a correctness guard (busyUrls re-locks a rebuilt in-flight card, and seq0 refetches):
  // entering link mode mid-mutation would just churn — detach the busy card, forcing decide's
  // reload fallback. It can wait the fraction of a second.
  if (mutBusy || linkBusy) return;
  linkAnchor = { job_url: j.job_url, title: j.title, company: j.company };
  renderLinkbar();
  refreshLinkControls();
}

function cancelLink() {
  if (linkBusy) return;  // the pinned pair is mid-commit — let it finish
  linkAnchor = null;
  renderLinkbar();       // leave link mode immediately, even while a decision POST is in flight
  // ...but defer the re-render while one is: it would detach the busy card for no gain. The
  // stale "↩ same role" buttons are inert without an anchor (completeLink no-ops) and correct
  // themselves on the next render.
  if (!mutBusy) refreshLinkControls();
}

// Re-render the linking affordances after linkAnchor changes — client-side state only, so no
// refetch. On Today a full render() is required (pinning an anchor suspends the hide-decided
// filter, changing WHICH cards render). On the other views the visible set can't change
// (wouldHide is today-gated), so patch the .linkctl buttons per card in place instead of
// rebuilding a ~7600-card backlog for a one-button swap.
function refreshLinkControls() {
  if (view === "today") {
    // Mid-load or after a failed load there is nothing valid to render — render() would paint
    // "Nothing here." from the emptied jobsData over the Loading/error state. The linkbar is
    // already updated; cards get the right buttons when the pending/next load renders.
    if (loadState !== "idle") return;
    const y = window.scrollY;
    render();
    // Pinning reveals hidden decided cards — possibly above the old offset, so a pixel restore
    // would land elsewhere: keep the just-pinned anchor in view instead. On cancel the set only
    // shrinks back; the pixel restore is right there.
    const anchorEl = linkAnchor
      && [...list.querySelectorAll(".card")].find(c => c.dataset.url === linkAnchor.job_url);
    if (anchorEl) anchorEl.scrollIntoView({block: "center"});
    else window.scrollTo(0, y);
    return;
  }
  const byUrl = new Map(jobsData.map(r => [r.job_url, r]));
  list.querySelectorAll(".card").forEach(div => {
    const j = byUrl.get(div.dataset.url);
    if (!j) return;
    div.querySelectorAll(".linkctl").forEach(b => b.remove());
    appendLinkControls(div.querySelector(".actions"), div, j);
  });
}

async function completeLink(div, target) {
  if (linkBusy || mutBusy || busyUrls.has(target.job_url)
      || !linkAnchor || target.job_url === linkAnchor.job_url) return;
  const anchorUrl = linkAnchor.job_url;
  const ok = confirm(
    `Link these as the SAME role?\n\n`
    + `  • ${target.title} — ${target.company}\n`
    + `  • ${linkAnchor.title} — ${linkAnchor.company}\n\n`
    + `The earliest posting becomes canonical; any decision propagates across both.`);
  if (!ok) return;
  linkBusy = true;
  div.classList.add("busy");
  busyUrls.add(target.job_url);
  try {
    const data = await postJSON("/api/dupe", {job_url: target.job_url, of: anchorUrl});
    if (!data.ok) { alert(data.message || "failed"); return; }
    // Add the server's exemptions (chain.py: the named pair plus the members of the side the
    // merge flipped to decided). ADD only — a delete here would wipe exemptions earned by
    // earlier actions this session on the same chain.
    exemptFromHide(data.exempt);
    linkAnchor = null;
    renderLinkbar();
    // Repost state changed across both chains — reload, and hold linkBusy until it lands so a
    // toggle/pin click can't render the stale pre-merge rows in the gap.
    await load();
  } catch (e) {
    alert("error: " + e);
    // The merge may have committed before the response was lost/timed out — keep the pair
    // reachable and refetch the truth rather than leaving stale pre-merge rows on screen.
    // linkAnchor stays pinned: the user chooses to retry or cancel. Await the recovery reload
    // so the finally can't drop the guards while stale rows are still on screen (the same
    // hold-until-landed rule as the success path).
    exemptFromHide([target.job_url, anchorUrl]);
    await load();
  }
  finally { linkBusy = false; releaseBusy(target.job_url, div); }
}

async function unlinkDup(div, j) {
  if (linkBusy || mutBusy || busyUrls.has(j.job_url)
      || !confirm(`Unlink "${j.title} — ${j.company}" from its canonical (split the manual link)?`)) return;
  linkBusy = true;
  div.classList.add("busy");
  busyUrls.add(j.job_url);
  try {
    const data = await postJSON("/api/dupe", {job_url: j.job_url, undo: true});
    if (!data.ok) { alert(data.message || "failed"); return; }
    // Add the server's exemptions (chain.py: just the interaction handles — clicked row, the
    // restored loser canonical, the old winner canonical; the split changes no member's
    // displayed decision, so the rest of the detached sub-chain stays hidden if it was
    // hidden). ADD only — see completeLink.
    exemptFromHide(data.exempt);
    await load();  // hold linkBusy until the reload lands (see completeLink)
  } catch (e) {
    alert("error: " + e);
    exemptFromHide([j.job_url]);  // see completeLink's catch — the split may have committed
    await load();                 // and hold the guards through the recovery reload too
  }
  finally { linkBusy = false; releaseBusy(j.job_url, div); }
}

let jobsData = [];  // last-fetched rows, so the hide-decided toggle re-renders without a refetch
let loadSeq = 0;    // stale-response guard: only the newest load() may install its rows
// "loading" | "failed" | "idle" — client-side render() paths consult this so they never paint
// over a Loading/error state with the (deliberately emptied) jobsData.
let loadState = "idle";

// The ONE "would the decided-filter hide this card?" predicate — render() and the toggle count
// must agree or the button label lies. Suspended while a duplicate-link anchor is pinned: the
// "↩ same role" target is often an already-decided row (e.g. a rule-rejected cross-post, which
// exists in no view but Today), and hiding it would strand the linking workflow.
function wouldHide(j) {
  return view === "today" && !linkAnchor
      && !!effectiveStatus(j) && !decidedThisSession.has(j.job_url);
}
function isHiddenDecided(j) { return hideDecided && wouldHide(j); }

function renderToggle() {
  // Count cards the filter *would* hide (independent of the current on/off state, so the button
  // doesn't vanish the moment it's toggled to "show"). Zero while linking — filter suspended.
  const decided = jobsData.filter(j => wouldHide(j)).length;
  toggleDecidedBtn.style.display = decided ? "" : "none";
  toggleDecidedBtn.textContent = (hideDecided ? "Show " : "Hide ") + decided + " decided";
}

function render() {
  const visible = jobsData.filter(j => !isHiddenDecided(j));
  const hidden = jobsData.length - visible.length;
  setCount(visible.length, hidden);
  renderToggle();
  list.innerHTML = "";
  if (!visible.length) {
    list.innerHTML = `<div class="empty">${hidden
      ? `All ${hidden} posting${hidden === 1 ? "" : "s"} decided — hidden.` : "Nothing here."}</div>`;
    return;
  }
  visible.forEach(j => list.appendChild(card(j)));
}

// Returns true when THIS load's rows reached the screen (false if superseded or failed), so a
// caller that wants to restore scroll knows whether the render it awaited actually happened.
async function load() {
  const seq = ++loadSeq;
  loadState = "loading";
  // Disarm the toggle and drop the outgoing view's rows and count: they are not valid for the
  // incoming view/date, and a client-side render() mid-fetch — or after a failed fetch — must
  // not repaint them under the new tab. render()/renderToggle() restore all three on success.
  toggleDecidedBtn.style.display = "none";
  jobsData = [];
  countEl.textContent = "";
  list.innerHTML = `<div class="empty">Loading…</div>`;
  const params = new URLSearchParams({view});
  if (view === "today") params.set("date", dateInput.value);
  let rows;
  try {  // narrow: a render() bug must not masquerade as a network failure
    const res = await fetch("/api/jobs?" + params, {
      // Same wedged-server insurance as postJSON: a hung /api/jobs must fail into the catch
      // below, not pin loadState at "loading" (eternal spinner, disarmed toggle) forever.
      signal: (typeof AbortSignal !== "undefined" && AbortSignal.timeout)
        ? AbortSignal.timeout(30000) : undefined,
    });
    rows = await res.json();
  } catch (e) {
    if (seq === loadSeq) {  // a superseded load's failure isn't this view's state
      loadState = "failed";
      list.innerHTML = `<div class="empty">Failed to load: ${esc(String(e))}</div>`;
    }
    return false;
  }
  if (seq !== loadSeq) return false;  // a newer load() superseded this response — drop it
  loadState = "idle";
  jobsData = rows;
  render();
  return true;
}

load();
</script>
</body>
</html>
